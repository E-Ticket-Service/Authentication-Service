databaseChangeLog:
  -logicalFilePath: 20260303-1-create-user.yaml
  -changeSet:
    id: 20260303-1-create-user.yaml
    author: nurlanaliyev
    changes:
      -createTable:
        tableName: user
        columns:
          name: id
          type: int
          constraints:
            primaryKey: true
            unique: true
            autoIncrement: true
            incrementBy: 1
            -column:
              name: name
              type: varchar(100)
              -column:
                name: lastname
                type: varchar(100)
                -column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
                    -column:
                      name: phone_number
                      type: varchar(255)
                      constraints:
                        unique: true
                        nullable: false
                        -column:
                          name: role
                          type: varchar(255)
                          -column:
                            name: status
                            type: varchar(255)
                            -column:
                              name: createdAt
                              type: timestamp
                              constraints:
                              defaultValueComputed: CURRENT_TIMESTAMP
                              -column:
                                name: updatedAt
                                type: timestamp
                                constraints:
                                nullable: true
