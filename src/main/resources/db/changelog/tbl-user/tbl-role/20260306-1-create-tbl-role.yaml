databaseChangeLog:
  - changeSet:
      id: 20260303-1-create-tbl-user
      author: nurlanaliyev
      changes:
        - createTable:
            tableName: user
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
