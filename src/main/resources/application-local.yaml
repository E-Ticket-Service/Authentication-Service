spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/e-ticket?currentSchema=auth_schema
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    hikari:
      minimum-idle: 2
      idle-timeout: 40000
      maximum-pool-size: 10
      connection-timeout: 10000
      keepalive-time: 30000

